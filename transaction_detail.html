<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

          extend: {
            "colors": {
                    "on-surface-variant": "#46464a",

                    "on-secondary": "#ffffff",

                    "tertiary-fixed-dim": "#4ae176",
                    "surface-bright": "#f8f9fa",
                    "surface": "#f8f9fa",
                    "on-surface": "#191c1d",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#16238e",
                    "on-primary-fixed-variant": "#474647",
                    "surface-variant": "#e1e3e4",
                    "on-tertiary-container": "#009844",
                    "error-container": "#ffdad6",
                    "secondary": "#4854bb",
                    "outline": "#77777b",
                    "on-primary-fixed": "#1c1b1c",
                    "error": "#ba1a1a",
                    "surface-tint": "#5f5e5f",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#8692fd",
                    "inverse-surface": "#2e3132",
                    "inverse-on-surface": "#f0f1f2",
                    "surface-container-highest": "#e1e3e4",
                    "surface-container": "#edeeef",
                    "tertiary-container": "#002109",
                    "surface-dim": "#d9dadb",
                    "secondary-fixed": "#dfe0ff",
                    "on-tertiary-fixed-variant": "#005321",
                    "on-error-container": "#93000a",
                    "on-error": "#ffffff",
                    "inverse-primary": "#c8c6c7",
                    "tertiary-fixed": "#6bff8f",
                    "primary-fixed": "#e5e2e3",
                    "background": "#f8f9fa",
                    "on-tertiary-fixed": "#002109",
                    "primary-fixed-dim": "#c8c6c7",
                    "on-primary-container": "#858384",
                    "surface-container-low": "#f3f4f5",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#bdc2ff",
                    "on-secondary-fixed-variant": "#2e3aa2",
                    "surface-container-high": "#e7e8e9",
                    "primary-container": "#1c1b1c",
                    "primary": "#000000",
                    "outline-variant": "#c7c6ca"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "32px",
                    "stack-lg": "24px",
                    "stack-md": "16px",
                    "section-padding": "120px",
                    "stack-sm": "8px",
                    "container-max": "1280px"
            },
            "fontFamily": {
                    "headline-md": ["Manrope"],
                    "headline-xl": ["Manrope"],
                    "label-md": ["Inter"],
                    "headline-lg": ["Manrope"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "headline-xl": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.03em", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "headline-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f8f9fa;
        }
        .canvas-shadow {
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface antialiased bg-background min-h-screen flex justify-center">
<!-- Mobile Container Emulator -->
<div class="w-full max-w-md bg-white min-h-screen relative shadow-2xl flex flex-col">
<!-- Top App Bar (Shared Component Reference) -->
<header class="bg-white sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4 border-b border-zinc-100 font-manrope antialiased tracking-tight shadow-sm">
<button class="text-zinc-900 active:scale-95 duration-150 p-2 -ml-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-extrabold tracking-tighter text-zinc-900">Transaction</h1>
<button class="text-zinc-900 active:scale-95 duration-150 p-2 -mr-2">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</header>
<main class="flex-1 px-6 pt-8 pb-32">
<!-- Merchant Header Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 rounded-2xl bg-zinc-50 border border-zinc-100 flex items-center justify-center mb-4 canvas-shadow overflow-hidden">
<img alt="Apple Logo" class="w-12 h-12 object-contain" data-alt="high contrast minimalist apple logo on a clean white background with sharp details" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVww0llIl_VYX1OKVDUDgS9xHQ0_XyxQesO0_u_dSLatgBOSZ7cSs3JRCGpCBXl_aRFfZXG-H0lgEcAD5rTiLuGU9xfmSFIgRPqPQax9bdjquo4cErsEC_1ZbxUqa_Dw9pkWY1TAdYTrhT3x25W2rQHVZqdLqw_fClthfR015GN-d8MdcP9BJFsOw5RRDOn7_PpGvMf8puLrF1_X5XclIyGmfrc9P2P3nyaApam0JDyL1mKkSTjPq6pX6avb21MURytZMf8xiunCwp"/>
</div>
<h2 class="font-headline-md text-on-surface mb-1">Apple Store</h2>
<div class="flex items-center gap-2 text-on-surface-variant font-label-md">
<span class="material-symbols-outlined text-[18px]" data-icon="mail">mail</span>
<span>Source: Digital Receipt</span>
</div>
</div>
<!-- Transaction Amount Card -->
<div class="bg-zinc-50 rounded-2xl p-6 mb-8 text-center border border-zinc-100">
<p class="text-on-surface-variant font-label-md uppercase tracking-widest mb-2">Total Amount</p>
<div class="font-headline-lg text-primary">-$1,299.00</div>
<p class="text-on-surface-variant font-body-md mt-2">Sep 24, 2023 • 10:42 AM</p>
</div>
<!-- Editable Fields Section -->
<div class="space-y-8">
<!-- Category Selection -->
<section>
<label class="block font-label-md text-on-surface-variant uppercase tracking-wider mb-4">Category</label>
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2 bg-primary text-white rounded-full font-label-md flex items-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[18px]" data-icon="devices" data-weight="fill" style="font-variation-settings: 'FILL' 1;">devices</span>
                            Electronics
                        </button>
<button class="px-4 py-2 bg-zinc-100 text-on-surface rounded-full font-label-md flex items-center gap-2 hover:bg-zinc-200 transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="shopping_bag">shopping_bag</span>
                            Shopping
                        </button>
<button class="px-4 py-2 bg-zinc-100 text-on-surface rounded-full font-label-md flex items-center gap-2 hover:bg-zinc-200 transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="work">work</span>
                            Business
                        </button>
<button class="w-10 h-10 rounded-full bg-zinc-50 border border-zinc-200 flex items-center justify-center text-zinc-400">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</section>
<!-- Notes Input -->
<section>
<label class="block font-label-md text-on-surface-variant uppercase tracking-wider mb-3">Notes</label>
<div class="relative">
<textarea class="w-full bg-zinc-50 border-0 rounded-xl p-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-white transition-all resize-none font-body-md" placeholder="Add memo for this purchase..." rows="3"></textarea>
</div>
</section>
<!-- Toggle for Exclude from budget -->
<section class="flex items-center justify-between p-4 bg-zinc-50 rounded-xl border border-zinc-100">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-white flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</div>
<div>
<p class="font-label-md text-on-surface">Exclude from budget</p>
<p class="text-[12px] text-on-surface-variant">Hide from monthly statistics</p>
</div>
</div>
<!-- Custom Toggle -->
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-zinc-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-zinc-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</section>
<!-- Transaction Details List -->
<section class="border-t border-zinc-100 pt-8 space-y-6">
<div class="flex justify-between items-center">
<span class="text-on-surface-variant font-body-md">Account</span>
<span class="font-label-md text-on-surface">Premium Card (**** 4292)</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant font-body-md">Reference ID</span>
<span class="font-label-md text-on-surface">#APP-938210-XC</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant font-body-md">Tax</span>
<span class="font-label-md text-on-surface">-$104.22</span>
</div>
</section>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-white/80 backdrop-blur-xl border-t border-zinc-100 z-50">
<button class="w-full bg-primary text-white py-4 rounded-2xl font-headline-md text-lg active:scale-95 transition-transform shadow-lg shadow-zinc-200">
                Save Changes
            </button>
</footer>
<!-- Bottom Navigation Spacer (Shared Component suppressed for task focus) -->
</div>
</body></html>
